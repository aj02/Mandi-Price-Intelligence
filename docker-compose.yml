services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: mandi-mitra:latest
    container_name: mandi-mitra
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      # Single-state focus mode. Unset to run a national dashboard.
      FOCUS_STATE: Maharashtra
      # Internal cron timing (IST). TZ is also set in the container.
      TZ: Asia/Kolkata
      CRON_INGEST_HOUR: "11"
      CRON_INGEST_MIN: "0"
      CRON_COMMENTARY_HOUR: "11"
      CRON_COMMENTARY_MIN: "30"
      RUN_ON_BOOT: "true"
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/cron/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
